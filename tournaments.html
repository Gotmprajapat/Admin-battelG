<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BattleG Admin - Tournaments</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/tournaments.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>BattleG</h2>

<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>

<a href="tournaments.html" class="active">
<i class="fa-solid fa-trophy"></i>
Tournaments
</a>

<a href="games.html">
<i class="fa-solid fa-gamepad"></i>
Games
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="deposits.html">
<i class="fa-solid fa-wallet"></i>
Deposits
</a>

<a href="withdraws.html">
<i class="fa-solid fa-money-bill-transfer"></i>
Withdraws
</a>

<a href="promocodes.html">
    <i class="fa-solid fa-gift"></i>
    Promo Codes
</a>
  
<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<a href="settings.html">
<i class="fa-solid fa-gear"></i>
Settings
</a>
    
</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h1>Tournament Management</h1>

<button id="createBtn">

+ Create Tournament

</button>

</div>

<div class="tableBox">

<table>

<thead>

<tr>

<th>Game</th>

<th>Title</th>

<th>Entry</th>

<th>Prize</th>

<th>Slots</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="tournamentTable">

<tr>

<td colspan="7">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- Popup -->

<div class="popup" id="popup">

<div class="popupBox">

<h2>Create Tournament</h2>

<input id="title" placeholder="Tournament Title">

<select id="game">

<option>Aim Challenge</option>

<option>Running Challenge</option>

<option>Reaction Challenge</option>

</select>

<input id="entryFee" type="number" placeholder="Entry Fee">

<input id="prizePool" type="number" placeholder="Prize Pool">

<input id="slots" type="number" placeholder="Total Slots">

<label>Start Time</label>

<input id="startTime" type="datetime-local">

<label>End Time</label>

<input id="endTime" type="datetime-local">

<button id="saveTournament">

Save Tournament

</button>

<button id="closePopup">

Cancel

</button>

</div>

</div>

<script type="module" src="js/tournaments.js"></script>

</body>

</html>
