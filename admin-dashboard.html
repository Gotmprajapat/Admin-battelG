<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BattleG</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <h2>BattleG Admin</h2>
            <nav>
                <a href="admin-dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="admin-users.html"><i class="fas fa-users"></i> Users</a>
                <a href="admin-deposits.html"><i class="fas fa-money-bill-wave"></i> Deposits</a>
                <a href="admin-withdrawals.html"><i class="fas fa-credit-card"></i> Withdrawals</a>
                <a href="admin-tournaments.html"><i class="fas fa-trophy"></i> Tournaments</a>
                <a href="admin-promo.html"><i class="fas fa-tags"></i> Promo Codes</a>
                <a href="admin-notifications.html"><i class="fas fa-bell"></i> Notifications</a>
                <a href="admin-reports.html"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="main-content">
            <h1>Dashboard</h1>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Total Users</h3>
                    <p id="totalUsers">0</p>
                </div>
                <div class="stat-card">
                    <h3>Today's Deposits</h3>
                    <p id="todayDeposits">₹0</p>
                </div>
                <div class="stat-card">
                    <h3>Today's Withdrawals</h3>
                    <p id="todayWithdrawals">₹0</p>
                </div>
                <div class="stat-card">
                    <h3>Today's Tournaments</h3>
                    <p id="todayTournaments">0</p>
                </div>
            </div>
        </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin-dashboard.js"></script>
</body>
</html>
