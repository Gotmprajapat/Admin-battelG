<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Admin</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <h2>BattleG Admin</h2>
            <nav>
                <a href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="admin-users.html"><i class="fas fa-users"></i> Users</a>
                <a href="admin-deposits.html"><i class="fas fa-money-bill-wave"></i> Deposits</a>
                <a href="admin-withdrawals.html"><i class="fas fa-credit-card"></i> Withdrawals</a>
                <a href="admin-tournaments.html"><i class="fas fa-trophy"></i> Tournaments</a>
                <a href="admin-promo.html"><i class="fas fa-tags"></i> Promo Codes</a>
                <a href="admin-notifications.html" class="active"><i class="fas fa-bell"></i> Notifications</a>
                <a href="admin-reports.html"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        <main class="main-content">
            <h1>Send Notification</h1>
            <div style="background:#111;padding:20px;border-radius:16px;max-width:500px;">
                <select id="targetType" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:10px;">
                    <option value="all">All Users</option>
                    <option value="selected">Specific User</option>
                </select>
                <input type="text" id="targetUserId" placeholder="User ID (if specific)" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:10px;">
                <input type="text" id="notifTitle" placeholder="Title" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:10px;">
                <textarea id="notifMessage" placeholder="Message" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:10px;height:80px;"></textarea>
                <button class="btn btn-approve" onclick="sendNotification()">Send</button>
            </div>
        </main>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin-notifications.js"></script>
</body>
</html>
