<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>BattleG Admin - Deposits</title>

<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/deposits.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>BattleG</h2>

<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>

<a href="tournaments.html">
<i class="fa-solid fa-trophy"></i>
Tournaments
</a>

<a href="games.html">
<i class="fa-solid fa-gamepad"></i>
Games
</a>

<a href="users.html">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="deposits.html" class="active">
<i class="fa-solid fa-wallet"></i>
Deposits
</a>

<a href="withdraws.html">
<i class="fa-solid fa-money-bill-transfer"></i>
Withdraws
</a>

<a href="notifications.html">
<i class="fa-solid fa-bell"></i>
Notifications
</a>

<div class="filterBar">

<input
type="text"
id="searchDeposit"
placeholder="Search User / Email">

<select id="statusFilter">

<option value="all">All</option>

<option value="pending">Pending</option>

<option value="approved">Approved</option>

<option value="rejected">Rejected</option>

</select>

</div>
  
</div>

<div class="main">

<div class="topbar">

<h1>Deposit Requests</h1>

</div>

<div class="tableBox">

<table>

<thead>

<tr>

<th>User</th>

<th>Email</th>

<th>Amount</th>

<th>UTR ID</th>

<th>Screenshot</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="depositTable">

<tr>

<td colspan="7">

No Deposit Requests

</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- Screenshot Popup -->

<div class="popup" id="popup">

<div class="popupBox">

<img id="paymentImage" src="" alt="Payment Screenshot">

<button id="closePopup">

Close

</button>

</div>

</div>

<script type="module" src="js/deposits.js"></script>

</body>

</html>
