<div class="main">

<h1>Send Notification</h1>

<div class="card">

<input
type="text"
id="title"
placeholder="Notification Title">

<textarea
id="message"
placeholder="Notification Message"></textarea>

<button id="sendBtn">

Send Notification

</button>

</div>

<h2>Notification History</h2>

<div class="tableBox">

<table>

<thead>

<tr>

<th>Title</th>

<th>Message</th>

<th>Date</th>

</tr>

</thead>

<tbody id="notificationTable">

<tr>

<td colspan="3">

No Notifications

</td>

</tr>

</tbody>

</table>

</div>

</div>
